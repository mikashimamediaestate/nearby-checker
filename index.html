<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>周辺施設チェッカー｜メディアエステート</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Hiragino Sans','Meiryo',sans-serif;background:#f0f2f5;min-height:100vh}
.header{background:#1a56a0;color:#fff;padding:14px 20px;display:flex;align-items:center;gap:12px}
.header h1{font-size:16px;font-weight:600}
.main{display:flex;height:calc(100vh - 50px)}
.sidebar{width:320px;background:#fff;overflow-y:auto;border-right:1px solid #ddd;flex-shrink:0;display:flex;flex-direction:column}
.map-area{flex:1;position:relative}
#map{width:100%;height:100%}
.section{padding:14px 16px;border-bottom:1px solid #eee}
.section-title{font-size:12px;font-weight:600;color:#555;margin-bottom:8px;letter-spacing:.5px}
.address-row{display:flex;gap:6px}
.address-row input{flex:1;padding:8px 10px;border:1px solid #ccc;border-radius:6px;font-size:13px;font-family:inherit}
.address-row button{padding:8px 12px;background:#1a56a0;color:#fff;border:none;border-radius:6px;font-size:13px;cursor:pointer;white-space:nowrap}
.address-row button:hover{background:#1344a0}
.status{font-size:12px;margin-top:6px;min-height:16px;color:#666}
.status.ok{color:#2a7a2a}.status.err{color:#c0392b}
.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.cat-item{display:flex;align-items:center;gap:6px;padding:6px 8px;border:1px solid #e0e0e0;border-radius:6px;cursor:pointer;font-size:13px;transition:background .15s}
.cat-item:hover{background:#f0f4ff}
.cat-item input{cursor:pointer;width:15px;height:15px;accent-color:#1a56a0}
.results-list{padding:10px 16px;flex:1}
.result-item{padding:9px 0;border-bottom:1px solid #f0f0f0;cursor:pointer}
.result-item:hover .result-name{color:#1a56a0}
.result-cat{font-size:11px;color:#888;margin-bottom:2px}
.result-name{font-size:14px;font-weight:700;color:#222;margin-bottom:4px}
.dist-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:3px}
.badge-walk{background:#e8f0fe;color:#1a56a0;border-radius:4px;padding:3px 8px;font-size:12px;font-weight:700}
.badge-dist{background:#f0f0f0;color:#555;border-radius:4px;padding:3px 8px;font-size:12px;font-weight:600}
.route-link{font-size:11px;color:#1a56a0;text-decoration:none;display:inline-block}
.route-link:hover{text-decoration:underline}
.copy-section{padding:12px 16px;background:#f8f9ff;border-top:1px solid #e0e0e0}
.copy-btn{width:100%;padding:9px;background:#2a7a2a;color:#fff;border:none;border-radius:6px;font-size:13px;cursor:pointer;font-family:inherit}
.copy-btn:hover{background:#1e5e1e}
.api-section{padding:12px 16px;background:#fff8e1;border-bottom:1px solid #f0c040}
.api-row{display:flex;gap:6px;margin-top:6px}
.api-row input{flex:1;padding:7px 10px;border:1px solid #ccc;border-radius:6px;font-size:12px;font-family:monospace}
.api-row button{padding:7px 10px;background:#555;color:#fff;border:none;border-radius:6px;font-size:12px;cursor:pointer}
.no-results{font-size:13px;color:#999;padding:16px 0;text-align:center}
/* 個別検索セクション */
.manual-section{padding:14px 16px;border-bottom:1px solid #eee;background:#f0fff4}
.manual-section .section-title{color:#2a7a2a}
.section-note{font-size:11px;color:#888;margin-bottom:6px}
.manual-row{display:flex;gap:6px;margin-bottom:6px}
.manual-row input{flex:1;padding:7px 10px;border:1px solid #ccc;border-radius:6px;font-size:13px;font-family:inherit}
.manual-row button{padding:7px 10px;background:#2a7a2a;color:#fff;border:none;border-radius:6px;font-size:13px;cursor:pointer;white-space:nowrap}
.manual-row button:hover{background:#1e5e1e}
.manual-result{margin-top:8px;padding:8px 10px;background:#fff;border:1px solid #b2dfdb;border-radius:6px;font-size:13px;display:none}
.manual-result .m-name{font-weight:700;color:#222;margin-bottom:4px}
.m-link{font-size:11px;color:#1a56a0;text-decoration:none}
.m-link:hover{text-decoration:underline}
</style>
</head>
<body>
<div class="header">
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg>
  <h1>周辺施設チェッカー｜メディアエステート</h1>
</div>
<div class="main">
  <div class="sidebar">
    <div class="api-section">
      <div class="section-title">Google Maps APIキー</div>
      <div class="api-row">
        <input type="password" id="api-key" placeholder="AIza..."/>
        <button onclick="saveKey()">設定</button>
      </div>
      <div id="key-status" class="status"></div>
    </div>
    <div class="section">
      <div class="section-title">物件住所</div>
      <div class="address-row">
        <input type="text" id="address" placeholder="例：佐賀県佐賀市多布施1-7-31" onkeydown="if(event.key==='Enter')doSearch()"/>
        <button onclick="doSearch()">検索</button>
      </div>
      <div id="search-status" class="status"></div>
    </div>
    <div class="section">
      <div class="section-title">施設カテゴリ（自動検索）</div>
      <div class="cat-grid" id="cat-grid"></div>
    </div>

    <!-- 個別施設検索 -->
    <div class="manual-section">
      <div class="section-title">📍 施設名・住所で直接検索</div>
      <div class="section-note">マイソク記載の施設など、個別に距離を調べたい場合</div>
      <div class="manual-row">
        <input type="text" id="manual-input" placeholder="例：大和正信会ふじおか病院" onkeydown="if(event.key==='Enter')doManualSearch()"/>
        <button onclick="doManualSearch()">調べる</button>
      </div>
      <div id="manual-status" class="status"></div>
      <div id="manual-result" class="manual-result">
        <div class="m-name" id="m-name"></div>
        <div class="dist-row" style="margin:4px 0">
          <span class="badge-walk" id="m-walk"></span>
          <span class="badge-dist" id="m-dist"></span>
        </div>
        <a class="m-link" id="m-link" href="#" target="_blank">Googleマップでルート確認 →</a>
      </div>
    </div>

    <div id="results-list" class="results-list"></div>
    <div class="copy-section" id="copy-section" style="display:none">
      <button class="copy-btn" onclick="copyText()">入稿用テキストをコピー</button>
    </div>
  </div>
  <div class="map-area"><div id="map"></div></div>
</div>
<script>
const CATS=[
  {id:'supermarket',label:'スーパー',keyword:'スーパーマーケット',color:'#e74c3c'},
  {id:'convenience',label:'コンビニ',keyword:'コンビニエンスストア',color:'#e67e22'},
  {id:'elementary',label:'小学校',keyword:'小学校',color:'#27ae60'},
  {id:'junior',label:'中学校',keyword:'中学校',color:'#16a085'},
  {id:'nursery',label:'保育園・幼稚園',keyword:'保育園',color:'#8e44ad'},
  {id:'hospital',label:'病院・クリニック',keyword:'病院 クリニック',color:'#c0392b'},
  {id:'drugstore',label:'ドラッグストア',keyword:'ドラッグストア 薬局',color:'#2980b9'},
  {id:'post',label:'郵便局',keyword:'郵便局',color:'#e74c3c'},
  {id:'station',label:'駅',keyword:'駅',color:'#34495e'},
];
const DEFAULT_ON=['supermarket','convenience','elementary','junior','drugstore','post'];
let apiKey='',map=null,geocoder=null,places=null,distMatrix=null,originLatLng=null,homeMarker=null,allResults=[],markerList=[];
let manualMarker=null,manualIw=null;

function buildGrid(){
  const g=document.getElementById('cat-grid');
  CATS.forEach(c=>{
    const l=document.createElement('label');l.className='cat-item';
    const cb=document.createElement('input');
    cb.type='checkbox';cb.id='cat_'+c.id;cb.checked=DEFAULT_ON.includes(c.id);
    cb.onchange=()=>filterResults();
    l.appendChild(cb);l.appendChild(document.createTextNode(c.label));
    g.appendChild(l);
  });
}

function saveKey(){
  const v=document.getElementById('api-key').value.trim();
  if(!v.startsWith('AIza')){setStatus('key-status','形式が正しくありません','err');return;}
  apiKey=v;
  setStatus('key-status','読み込み中...','');
  const s=document.createElement('script');
  s.src=`https://maps.googleapis.com/maps/api/js?key=${apiKey}&libraries=places,geometry&language=ja&region=JP&callback=initMaps`;
  s.onerror=()=>setStatus('key-status','APIキーエラー','err');
  document.head.appendChild(s);
}

window.initMaps=function(){
  map=new google.maps.Map(document.getElementById('map'),{
    center:{lat:33.25,lng:130.3},zoom:15,
    mapTypeControl:false,streetViewControl:false
  });
  geocoder=new google.maps.Geocoder();
  places=new google.maps.places.PlacesService(map);
  distMatrix=new google.maps.DistanceMatrixService();
  setStatus('key-status','APIキーを設定しました ✓','ok');
};

async function doSearch(){
  if(!apiKey){alert('先にAPIキーを設定してください');return;}
  if(!places){alert('Google Mapsを読み込み中です。少し待ってから再試行してください。');return;}
  const addr=document.getElementById('address').value.trim();
  if(!addr){alert('住所を入力してください');return;}
  setStatus('search-status','住所を検索中...','');
  clearMarkers();allResults=[];
  document.getElementById('results-list').innerHTML='';
  document.getElementById('copy-section').style.display='none';
  try{
    originLatLng=await geocode(addr);
    map.setCenter(originLatLng);map.setZoom(16);
    if(homeMarker)homeMarker.setMap(null);
    homeMarker=new google.maps.Marker({
      position:originLatLng,map,title:'物件',zIndex:999,
      icon:{
        path:'M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z',
        fillColor:'#1a56a0',fillOpacity:1,strokeColor:'#fff',strokeWeight:2,
        scale:1.8,anchor:new google.maps.Point(12,22)
      }
    });
    const iw0=new google.maps.InfoWindow({content:'<div style="font-size:13px;font-weight:bold;padding:4px">📍 物件</div>'});
    iw0.open(map,homeMarker);
    homeMarker.addListener('click',()=>iw0.open(map,homeMarker));

    setStatus('search-status','周辺施設を検索中...','');
    const selected=CATS.filter(c=>document.getElementById('cat_'+c.id)?.checked);
    const results=await Promise.all(selected.map(c=>searchCat(c)));
    let rawResults=[];
    results.forEach((ps,i)=>{
      if(ps&&ps.length>0){
        ps.slice(0,3).forEach(p=>{
          rawResults.push({cat:selected[i],name:p.name,latlng:p.geometry.location});
        });
      }
    });

    setStatus('search-status','徒歩時間を計算中...','');
    const chunks=[];
    for(let i=0;i<rawResults.length;i+=25)chunks.push(rawResults.slice(i,i+25));
    for(const chunk of chunks){
      const dests=chunk.map(r=>r.latlng);
      const dmResult=await getDistanceMatrix(dests);
      chunk.forEach((r,i)=>{
        const el=dmResult.rows[0].elements[i];
        if(el.status==='OK'){
          r.walkDistM=el.distance.value;
          r.walkMins=Math.ceil(el.distance.value/80);
          r.walkText=r.walkMins+'分';
        } else {
          const dx=r.latlng.lat()-originLatLng.lat(),dy=r.latlng.lng()-originLatLng.lng();
          const m=Math.round(Math.sqrt(dx*dx+dy*dy)*111000);
          r.walkDistM=m;
          r.walkMins=Math.ceil(m/80);
          r.walkText=r.walkMins+'分';
        }
      });
    }
    allResults=rawResults.sort((a,b)=>a.walkDistM-b.walkDistM);
    setStatus('search-status',`${allResults.length}件見つかりました`,'ok');
    renderResults(allResults);addMarkers(allResults);
  }catch(e){setStatus('search-status','エラー: '+e.message,'err');}
}

// 個別施設検索（施設名または住所）
async function doManualSearch(){
  if(!originLatLng){alert('先に物件住所を検索してください');return;}
  const query=document.getElementById('manual-input').value.trim();
  if(!query){alert('施設名または住所を入力してください');return;}
  setStatus('manual-status','検索中...','');
  document.getElementById('manual-result').style.display='none';
  try{
    let destLatLng=null;
    let destName=query;
    // まずPlaces textSearchで施設名として検索（より確実）
    try{
      const placeResult=await searchPlaceByName(query);
      destLatLng=placeResult.latlng;
      destName=placeResult.name;
    }catch(e){
      // 施設名で見つからなければ住所として試みる
      destLatLng=await geocode(query);
    }

    // 距離計算（道路距離÷80で切り上げ）
    const dmResult=await getDistanceMatrix([destLatLng]);
    const el=dmResult.rows[0].elements[0];
    if(el.status!=='OK')throw new Error('距離を計算できませんでした');
    const distM=el.distance.value;
    const mins=Math.ceil(distM/80);

    // 地図にマーカー表示
    if(manualMarker)manualMarker.setMap(null);
    if(manualIw)manualIw.close();
    manualMarker=new google.maps.Marker({
      position:destLatLng,map,title:destName,zIndex:998,
      icon:{path:google.maps.SymbolPath.CIRCLE,scale:11,fillColor:'#e74c3c',fillOpacity:1,strokeColor:'#fff',strokeWeight:2}
    });
    manualIw=new google.maps.InfoWindow({
      content:`<div style="font-size:13px;padding:4px"><b>${destName}</b><br><span style="color:#1a56a0;font-weight:bold">🚶 徒歩${mins}分（${distM}m）</span></div>`
    });
    manualIw.open(map,manualMarker);
    manualMarker.addListener('click',()=>manualIw.open(map,manualMarker));
    map.setCenter(destLatLng);

    // 結果表示
    document.getElementById('m-name').textContent=destName;
    document.getElementById('m-walk').textContent='🚶 徒歩'+mins+'分';
    document.getElementById('m-dist').textContent=distM+'m';
    document.getElementById('m-link').href=makeRouteUrl(destLatLng);
    document.getElementById('manual-result').style.display='';
    setStatus('manual-status','','');
  }catch(e){
    setStatus('manual-status',e.message,'err');
  }
}

function searchPlaceByName(name){
  return new Promise((res,rej)=>{
    places.textSearch({query:name,location:originLatLng,radius:10000},(r,s)=>{
      if(s==='OK'&&r[0])res({latlng:r[0].geometry.location,name:r[0].name});
      else rej(new Error('施設が見つかりませんでした'));
    });
  });
}

function getDistanceMatrix(destinations){
  return new Promise((res,rej)=>{
    distMatrix.getDistanceMatrix({
      origins:[originLatLng],
      destinations:destinations,
      travelMode:google.maps.TravelMode.WALKING,
      language:'ja'
    },(result,status)=>{
      if(status==='OK')res(result);
      else rej(new Error('DistanceMatrix error: '+status));
    });
  });
}

function geocode(addr){
  return new Promise((res,rej)=>{
    geocoder.geocode({address:addr,region:'JP'},(r,s)=>{
      if(s==='OK'&&r[0])res(r[0].geometry.location);
      else rej(new Error('住所が見つかりません: '+s));
    });
  });
}

function searchCat(cat){
  return new Promise(res=>{
    places.nearbySearch({location:originLatLng,rankBy:google.maps.places.RankBy.DISTANCE,keyword:cat.keyword},(r,s)=>{
      res(s==='OK'?r:[]);
    });
  });
}

function makeRouteUrl(dest){
  return`https://www.google.com/maps/dir/${originLatLng.lat()},${originLatLng.lng()}/${dest.lat()},${dest.lng()}/`;
}

function filterResults(){
  const active=new Set(CATS.filter(c=>document.getElementById('cat_'+c.id)?.checked).map(c=>c.id));
  const filtered=allResults.filter(r=>active.has(r.cat.id));
  renderResults(filtered);clearMarkers();addMarkers(filtered);
}

function renderResults(list){
  const el=document.getElementById('results-list');
  if(list.length===0){el.innerHTML='<div class="no-results">施設が見つかりませんでした</div>';return;}
  el.innerHTML=list.map((r,i)=>`
    <div class="result-item" onclick="focusMarker(${i})">
      <div class="result-cat">${r.cat.label}</div>
      <div class="result-name">${r.name}</div>
      <div class="dist-row">
        <span class="badge-walk">🚶 徒歩${r.walkText}</span>
        <span class="badge-dist">${r.walkDistM}m</span>
      </div>
      <a class="route-link" href="${makeRouteUrl(r.latlng)}" target="_blank" onclick="event.stopPropagation()">Googleマップでルート確認 →</a>
    </div>`).join('');
  document.getElementById('copy-section').style.display='';
}

function addMarkers(list){
  markerList=list.map((r,i)=>{
    const m=new google.maps.Marker({
      position:r.latlng,map,title:r.name,
      icon:{path:google.maps.SymbolPath.CIRCLE,scale:10,fillColor:r.cat.color,fillOpacity:1,strokeColor:'#fff',strokeWeight:2},
      label:{text:String(i+1),color:'#fff',fontSize:'11px',fontWeight:'bold'}
    });
    const iw=new google.maps.InfoWindow({
      content:`<div style="font-size:13px;padding:4px;min-width:160px">
        <b>${r.name}</b><br>
        <span style="color:#555;font-size:11px">${r.cat.label}</span><br>
        <span style="color:#1a56a0;font-weight:bold">🚶 徒歩${r.walkText}（${r.walkDistM}m）</span><br>
        <a href="${makeRouteUrl(r.latlng)}" target="_blank" style="color:#1a56a0;font-size:11px">Googleマップでルート確認 →</a>
      </div>`
    });
    m.addListener('click',()=>{markerList.forEach(x=>x.iw.close());iw.open(map,m);});
    return{marker:m,iw};
  });
}

function focusMarker(i){
  if(markerList[i]){
    map.setCenter(markerList[i].marker.getPosition());
    map.setZoom(17);
    markerList.forEach(x=>x.iw.close());
    markerList[i].iw.open(map,markerList[i].marker);
  }
}

function clearMarkers(){markerList.forEach(m=>{m.marker.setMap(null);m.iw.close();});markerList=[];}

function copyText(){
  const active=new Set(CATS.filter(c=>document.getElementById('cat_'+c.id)?.checked).map(c=>c.id));
  const lines=allResults.filter(r=>active.has(r.cat.id)).map(r=>`${r.cat.label}：${r.name}　${r.walkDistM}m（徒歩${r.walkText}）`);
  navigator.clipboard.writeText(lines.join('\n')).then(()=>alert('コピーしました！'));
}

function setStatus(id,msg,type){const e=document.getElementById(id);e.textContent=msg;e.className='status '+(type||'');}
buildGrid();
</script>
</body>
</html>
