<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>物件進捗ダッシュボード | メディアエステート</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Hiragino Sans','Yu Gothic',sans-serif;background:#0f1117;color:#e2e8f0;min-height:100vh}
header{background:#0f1117;border-bottom:1px solid #1e2a3a;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;flex-wrap:wrap;gap:8px}
.logo{font-size:13px;letter-spacing:3px;color:#4a9eff;font-weight:600}
.header-center{font-size:14px;color:#94a3b8}
.api-area{display:flex;gap:8px;align-items:center}
.api-area input{background:#1a2332;border:1px solid #2d3f55;border-radius:6px;color:#e2e8f0;font-size:12px;padding:7px 12px;width:260px;outline:none}
.api-area input:focus{border-color:#4a9eff}
.api-area button{background:#4a9eff;border:none;border-radius:6px;color:#fff;cursor:pointer;font-size:12px;font-weight:600;padding:7px 16px;white-space:nowrap}
.api-area button:hover{background:#3a8eef}
.api-area button:disabled{background:#2d3f55;color:#64748b;cursor:not-allowed}
.tabs{display:flex;padding:0 24px;border-bottom:1px solid #1e2a3a;background:#0f1117}
.tab{padding:12px 20px;font-size:13px;cursor:pointer;color:#64748b;border-bottom:2px solid transparent;transition:all .2s}
.tab:hover{color:#94a3b8}
.tab.active{color:#4a9eff;border-bottom-color:#4a9eff}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px;padding:16px 24px}
.stat{background:#1a2332;border-radius:10px;padding:12px 16px;border:1px solid #1e2a3a}
.stat-label{font-size:11px;color:#64748b;margin-bottom:4px}
.stat-val{font-size:24px;font-weight:700}
.green{color:#22c55e}.red{color:#ef4444}.blue{color:#4a9eff}
.filter-bar{display:flex;gap:10px;flex-wrap:wrap;padding:0 24px 14px}
.filter-bar select,.filter-bar input{background:#1a2332;border:1px solid #2d3f55;border-radius:6px;color:#e2e8f0;font-size:12px;padding:7px 10px;outline:none}
.filter-bar input{flex:1;min-width:140px}
.panel{display:none;padding:0 24px 24px}
.panel.active{display:block}
.prop-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:12px;padding-top:4px}
.prop-card{background:#1a2332;border:1px solid #1e2a3a;border-radius:10px;padding:14px 16px;cursor:pointer;transition:border-color .2s}
.prop-card:hover{border-color:#4a9eff}
.prop-name{font-size:13px;font-weight:600;margin-bottom:4px}
.prop-addr{font-size:11px;color:#64748b;margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.prop-price{font-size:12px;color:#94a3b8;margin-bottom:6px}
.badge{display:inline-block;font-size:10px;padding:2px 8px;border-radius:4px;margin-right:3px;font-weight:500}
.b-done{background:rgba(34,197,94,.15);color:#22c55e}
.b-wip{background:rgba(245,158,11,.15);color:#f59e0b}
.b-new{background:rgba(74,158,255,.15);color:#4a9eff}
.b-app{background:rgba(239,68,68,.15);color:#ef4444}
.prop-note{font-size:10px;color:#64748b;margin-top:4px}
table{width:100%;border-collapse:collapse;font-size:12px;margin-top:4px}
th{text-align:left;padding:8px 10px;font-weight:500;color:#64748b;border-bottom:1px solid #1e2a3a;background:#0f1117}
td{padding:7px 10px;border-bottom:1px solid #1a2332;color:#94a3b8;vertical-align:top}
tr:hover td{background:#1a2332}
td.nm{font-weight:600;color:#e2e8f0}
#map-panel{padding:0 24px 24px;display:none}
#map-panel.active{display:block}
.map-wrap{position:relative;width:100%;height:560px;border-radius:10px;overflow:hidden;border:1px solid #1e2a3a}
#map{width:100%;height:100%}
.map-ph{width:100%;height:100%;background:#1a2332;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px}
.map-ph p{font-size:13px;color:#64748b;text-align:center;max-width:300px;line-height:1.6}
.hint{font-size:11px;color:#4a4a5a;background:#0f1117;padding:8px 14px;border-radius:6px;border:1px solid #1e2a3a}
.map-legend{display:flex;gap:16px;flex-wrap:wrap;margin-top:12px;font-size:12px;color:#64748b;align-items:center}
.li{display:flex;align-items:center;gap:5px}
.ld{width:10px;height:10px;border-radius:50%;display:inline-block}
.alert{background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.2);border-radius:8px;padding:10px 14px;font-size:12px;color:#f59e0b;margin-bottom:12px}
.geo-progress{background:#1a2332;border:1px solid #2d3f55;border-radius:8px;padding:10px 14px;font-size:12px;color:#94a3b8;margin-bottom:12px;display:none}
.geo-bar-wrap{background:#0f1117;border-radius:4px;height:4px;margin-top:8px;overflow:hidden}
.geo-bar{background:#4a9eff;height:4px;border-radius:4px;transition:width .3s;width:0%}
</style>
</head>
<body>

<header>
  <div class="logo">MEDIA ESTATE // 物件ダッシュボード</div>
  <div class="header-center">アーネストワン 佐賀営業所 | 2026.04.23</div>
  <div class="api-area">
    <input type="password" id="api-key" placeholder="Google Maps APIキーを入力" />
    <button id="map-btn" onclick="startMap()">地図を表示</button>
  </div>
</header>

<div class="stats" id="stats-row"></div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('map')">🗺 地図</div>
  <div class="tab" onclick="switchTab('cards')">🏠 カード</div>
  <div class="tab" onclick="switchTab('table')">📋 テーブル</div>
</div>

<div class="filter-bar">
  <select id="f-area" onchange="render()">
    <option value="">全エリア</option>
    <option value="佐賀市">佐賀市</option>
    <option value="小城市">小城市</option>
    <option value="神埼市">神埼市</option>
    <option value="杵島郡">杵島郡</option>
    <option value="唐津市">唐津市</option>
  </select>
  <select id="f-st" onchange="render()">
    <option value="">全ステータス</option>
    <option value="完成">完成</option>
    <option value="木工事">木工事</option>
    <option value="基礎">基礎</option>
    <option value="更地">更地</option>
  </select>
  <input id="f-txt" placeholder="物件名を検索..." oninput="render()" />
</div>

<div id="map-panel" class="panel active">
  <div class="alert">⚠ 地図のピンはナビ住所（マイソクPDF記載）をGoogleジオコーディングで自動取得しています。正確な現地位置はマイソクのマップで必ずご確認ください。</div>
  <div class="geo-progress" id="geo-progress">
    <span id="geo-msg">住所から座標を取得中...</span>
    <div class="geo-bar-wrap"><div class="geo-bar" id="geo-bar"></div></div>
  </div>
  <div class="map-wrap">
    <div class="map-ph" id="map-ph">
      <p>右上の入力欄にGoogle Maps APIキーを入力して<br>「地図を表示」ボタンを押してください</p>
      <div class="hint">周辺施設チェッカーと同じAPIキーが使えます</div>
    </div>
    <div id="map" style="display:none"></div>
  </div>
  <div class="map-legend">
    <span style="color:#94a3b8;font-weight:500">凡例：</span>
    <div class="li"><span class="ld" style="background:#22c55e"></span>完成・即引渡</div>
    <div class="li"><span class="ld" style="background:#f59e0b"></span>工事中</div>
    <div class="li"><span class="ld" style="background:#ef4444"></span>申込あり</div>
    <div class="li"><span class="ld" style="background:#4a9eff"></span>新規物件</div>
    <div class="li"><span class="ld" style="background:#6b7280"></span>その他</div>
  </div>
</div>

<div id="cards-panel" class="panel">
  <div class="prop-grid" id="card-grid"></div>
</div>

<div id="table-panel" class="panel">
  <table>
    <thead><tr>
      <th>物件名</th><th>エリア</th><th>号棟</th><th>価格</th><th>進捗</th><th>小学校区</th><th>内覧</th><th>備考</th>
    </tr></thead>
    <tbody id="tbl-body"></tbody>
  </table>
</div>

<script>
const PROPS = [
  {id:1,name:"高木瀬西第10",area:"佐賀市",addr:"佐賀県佐賀市高木瀬西五丁目12-25",
   units:[{no:1,price:2488,st:"完成",app:false},{no:2,price:2888,st:"完成",app:false}],
   school:"高木瀬",kanai:true,note:"値下げ・平屋"},
  {id:2,name:"光第8",area:"佐賀市",addr:"佐賀県佐賀市光二丁目6-15",
   units:[{no:1,price:2488,st:"完成",app:false},{no:2,price:2388,st:"完成",app:false}],
   school:"西与賀",kanai:true,note:"値下げ"},
  {id:3,name:"大和町久池井第27",area:"佐賀市",addr:"佐賀県佐賀市大和町久池井1543-33",
   units:[{no:1,price:2188,st:"完成",app:false}],school:"春日北",kanai:true,note:""},
  {id:4,name:"神野西第7",area:"佐賀市",addr:"佐賀県佐賀市神野西三丁目10-6",
   units:[{no:1,price:2788,st:"完成",app:false},{no:2,price:2688,st:"完成",app:false}],
   school:"神野",kanai:true,note:""},
  {id:5,name:"西田代第3",area:"佐賀市",addr:"佐賀県佐賀市西田代一丁目3-8",
   units:[{no:1,price:2988,st:"木工事",app:false}],school:"日新",kanai:false,note:"2026年5月完成予定"},
  {id:6,name:"大和町東山田第3",area:"佐賀市",addr:"佐賀県佐賀市大和町大字東山田2832-6",
   units:[{no:1,price:2688,st:"木工事",app:false}],school:"川上",kanai:false,note:"平屋・2026年5月完成予定"},
  {id:7,name:"大和町尼寺第23",area:"佐賀市",addr:"佐賀県佐賀市大和町大字尼寺1293",
   units:[{no:1,price:2388,st:"完成",app:false},{no:2,price:2288,st:"完成",app:true}],
   school:"春日",kanai:true,note:"2号棟申込あり"},
  {id:8,name:"大和町久池井第28",area:"佐賀市",addr:"佐賀県佐賀市大和町大字尼寺4169",
   units:[{no:1,price:2788,st:"木工事",app:false},{no:2,price:2688,st:"木工事",app:false}],
   school:"春日北",kanai:false,note:"2026年5月完成予定"},
  {id:9,name:"金立町千布第3",area:"佐賀市",addr:"佐賀県佐賀市金立町大字千布2260",
   units:[{no:1,price:2388,st:"基礎",app:false},{no:2,price:2288,st:"基礎",app:false}],
   school:"金立",kanai:false,note:"2026年6月完成予定"},
  {id:10,name:"高木瀬東第17",area:"佐賀市",addr:"佐賀県佐賀市高木瀬東三丁目11-12",
   units:[{no:1,price:2788,st:"更地",app:false,isnew:true},{no:2,price:2688,st:"更地",app:false,isnew:true},{no:3,price:2888,st:"更地",app:false,isnew:true}],
   school:"高木瀬",kanai:false,note:"新規・2026年7月完成予定"},
  {id:11,name:"高木瀬西第11",area:"佐賀市",addr:"佐賀県佐賀市高木瀬西五丁目6-25",
   units:[{no:1,price:2788,st:"更地",app:false,isnew:true},{no:2,price:2888,st:"更地",app:false,isnew:true}],
   school:"高木瀬",kanai:false,note:"新規・2026年7月完成予定"},
  {id:12,name:"神埼町本堀第1",area:"佐賀市",addr:"佐賀県佐賀市神埼町本堀2598-4",
   units:[{no:1,price:2588,st:"完成",app:false},{no:2,price:2488,st:"完成",app:false}],
   school:"外町",kanai:true,note:""},
  {id:13,name:"三日月町久米第10",area:"小城市",addr:"佐賀県小城市三日月町久米569",
   units:[{no:1,price:2288,st:"完成",app:false}],school:"桜岡",kanai:true,note:"竣工"},
  {id:14,name:"神埼町本堀第1",area:"神埼市",addr:"佐賀県神埼市神埼町本堀2598-4",
   units:[{no:1,price:1988,st:"完成",app:true},{no:2,price:2088,st:"完成",app:true}],
   school:"神埼",kanai:true,note:"竣工済み・申込あり"},
  {id:15,name:"江北町惣領分第1",area:"杵島郡",addr:"佐賀県杵島郡江北町大字惣領分1931",
   units:[{no:2,price:2188,st:"完成",app:false},{no:3,price:null,st:"完成",app:true}],
   school:"江北",kanai:true,note:"平屋・竣工済み・3号棟申込あり"},
  {id:16,name:"旭が丘第1",area:"唐津市",addr:"佐賀県唐津市旭が丘6-7",
   units:[{no:1,price:2588,st:"完成",app:false},{no:2,price:2488,st:"完成",app:false}],
   school:"外町",kanai:true,note:""},
];

let map, markers=[], iw, geocoder;
let geocoded={};

function getPSt(p){
  if(p.units.some(u=>u.app)) return 'app';
  if(p.units.some(u=>u.isnew)) return 'new';
  const ss=[...new Set(p.units.map(u=>u.st))];
  if(ss.includes('完成')) return '完成';
  if(ss.includes('木工事')) return '木工事';
  return ss[0]||'';
}
function mcolor(p){
  const s=getPSt(p);
  if(s==='app') return '#ef4444';
  if(s==='new') return '#4a9eff';
  if(s==='完成') return '#22c55e';
  if(s==='木工事') return '#f59e0b';
  return '#6b7280';
}
function minPrice(p){
  const pp=p.units.map(u=>u.price).filter(Boolean);
  if(!pp.length) return '—';
  const mn=Math.min(...pp),mx=Math.max(...pp);
  return mn===mx?mn.toLocaleString()+'万円':mn.toLocaleString()+'〜'+mx.toLocaleString()+'万円';
}
function badge(p){
  const s=getPSt(p);
  if(s==='app') return '<span class="badge b-app">申込あり</span>';
  if(s==='new') return '<span class="badge b-new">新規</span>';
  if(s==='完成') return '<span class="badge b-done">完成</span>';
  return '<span class="badge b-wip">'+s+'</span>';
}
function getFiltered(){
  const a=document.getElementById('f-area').value;
  const s=document.getElementById('f-st').value;
  const t=document.getElementById('f-txt').value.toLowerCase();
  return PROPS.filter(p=>{
    if(a&&p.area!==a) return false;
    if(t&&!p.name.toLowerCase().includes(t)) return false;
    if(s&&!p.units.some(u=>u.st===s)) return false;
    return true;
  });
}
function renderStats(){
  const total=PROPS.reduce((s,p)=>s+p.units.length,0);
  const done=PROPS.reduce((s,p)=>s+p.units.filter(u=>u.st==='完成').length,0);
  const app=PROPS.reduce((s,p)=>s+p.units.filter(u=>u.app).length,0);
  const nw=PROPS.filter(p=>p.units.some(u=>u.isnew)).length;
  document.getElementById('stats-row').innerHTML=`
    <div class="stat"><div class="stat-label">現場数</div><div class="stat-val">${PROPS.length}</div></div>
    <div class="stat"><div class="stat-label">総棟数</div><div class="stat-val">${total}</div></div>
    <div class="stat"><div class="stat-label">完成済み</div><div class="stat-val green">${done}</div></div>
    <div class="stat"><div class="stat-label">申込あり</div><div class="stat-val red">${app}</div></div>
    <div class="stat"><div class="stat-label">新規物件</div><div class="stat-val blue">${nw}現場</div></div>
  `;
}
function render(){
  const props=getFiltered();
  document.getElementById('card-grid').innerHTML=props.map(p=>`
    <div class="prop-card" onclick="focusPin(${p.id})">
      <div class="prop-name">${p.name}</div>
      <div class="prop-addr">${p.addr.replace('佐賀県','')}</div>
      <div class="prop-price">${minPrice(p)}</div>
      <div>${badge(p)}</div>
      ${p.note?`<div class="prop-note">${p.note}</div>`:''}
    </div>
  `).join('');
  document.getElementById('tbl-body').innerHTML=props.map(p=>p.units.map((u,i)=>`
    <tr>
      ${i===0?`<td class="nm" rowspan="${p.units.length}">${p.name}</td><td rowspan="${p.units.length}">${p.area}</td>`:''}
      <td>${u.no}号棟</td>
      <td>${u.price?u.price.toLocaleString()+'万':'—'}</td>
      <td>${u.st}${u.app?' ⚠申込':''}</td>
      ${i===0?`<td rowspan="${p.units.length}">${p.school}</td><td rowspan="${p.units.length}">${p.kanai?'○':'—'}</td><td rowspan="${p.units.length}">${p.note||''}</td>`:''}
    </tr>
  `).join('')).join('');
  if(map) updateMarkers(props);
}
function switchTab(t){
  document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('active',['map','cards','table'][i]===t));
  ['map-panel','cards-panel','table-panel'].forEach(id=>document.getElementById(id).classList.remove('active'));
  document.getElementById(t+'-panel').classList.add('active');
}
function geocodeAll(callback){
  const prog=document.getElementById('geo-progress');
  const bar=document.getElementById('geo-bar');
  const msg=document.getElementById('geo-msg');
  prog.style.display='block';
  let i=0;
  function next(){
    if(i>=PROPS.length){prog.style.display='none';callback();return;}
    const p=PROPS[i];
    msg.textContent=`座標取得中... (${i+1}/${PROPS.length}) ${p.name}`;
    bar.style.width=((i/PROPS.length)*100)+'%';
    geocoder.geocode({address:p.addr,region:'JP'},function(results,status){
      if(status==='OK'&&results[0]){
        geocoded[p.id]={lat:results[0].geometry.location.lat(),lng:results[0].geometry.location.lng()};
      } else {
        console.warn('Geocode failed:',p.name,status);
        geocoded[p.id]={lat:33.2635,lng:130.3007};
      }
      i++;
      setTimeout(next,250);
    });
  }
  next();
}
function startMap(){
  const key=document.getElementById('api-key').value.trim();
  if(!key){alert('APIキーを入力してください');return;}
  const btn=document.getElementById('map-btn');
  btn.disabled=true;
  btn.textContent='読み込み中...';
  if(window.google&&window.google.maps){initMapAfterLoad();return;}
  const s=document.createElement('script');
  s.src=`https://maps.googleapis.com/maps/api/js?key=${key}&language=ja&callback=initMapAfterLoad`;
  s.async=true;s.defer=true;
  s.onerror=()=>{
    alert('Maps APIの読み込みに失敗しました。APIキーをご確認ください。');
    btn.disabled=false;btn.textContent='地図を表示';
  };
  window.initMapAfterLoad=initMapAfterLoad;
  document.head.appendChild(s);
}
function initMapAfterLoad(){
  document.getElementById('map-ph').style.display='none';
  document.getElementById('map').style.display='block';
  map=new google.maps.Map(document.getElementById('map'),{
    center:{lat:33.265,lng:130.30},zoom:11,
    mapTypeControl:false,streetViewControl:false,
    styles:[{featureType:'poi',elementType:'labels',stylers:[{visibility:'off'}]}]
  });
  iw=new google.maps.InfoWindow();
  geocoder=new google.maps.Geocoder();
  switchTab('map');
  geocodeAll(function(){
    const btn=document.getElementById('map-btn');
    btn.disabled=false;btn.textContent='座標を再取得';
    updateMarkers(getFiltered());
  });
}
function updateMarkers(props){
  markers.forEach(m=>m.setMap(null));
  markers=[];
  props.forEach(p=>{
    const pos=geocoded[p.id];
    if(!pos) return;
    const m=new google.maps.Marker({
      position:{lat:pos.lat,lng:pos.lng},map,title:p.name,
      icon:{path:google.maps.SymbolPath.CIRCLE,scale:9,fillColor:mcolor(p),fillOpacity:1,strokeColor:'#fff',strokeWeight:2}
    });
    m.addListener('click',()=>{
      iw.setContent(`<div style="font-family:'Hiragino Sans',sans-serif;padding:4px;min-width:190px">
        <div style="font-weight:700;font-size:14px;margin-bottom:4px">${p.name}</div>
        <div style="font-size:12px;color:#555">${p.addr.replace('佐賀県','')}</div>
        <div style="font-size:13px;font-weight:600;margin-top:5px">${minPrice(p)}</div>
        <div style="font-size:11px;color:#777;margin-top:4px">${p.units.map(u=>`${u.no}号棟：${u.st}${u.app?' 申込あり':''}`).join('<br>')}</div>
        ${p.note?`<div style="font-size:11px;color:#999;margin-top:4px">${p.note}</div>`:''}
        <div style="font-size:10px;color:#bbb;margin-top:6px">小学校区：${p.school}　内覧：${p.kanai?'○':'—'}</div>
      </div>`);
      iw.open(map,m);
    });
    markers.push(m);
  });
}
function focusPin(id){
  const p=PROPS.find(x=>x.id===id);
  if(!p) return;
  if(!map){switchTab('map');return;}
  switchTab('map');
  const pos=geocoded[p.id];
  if(!pos) return;
  setTimeout(()=>{
    map.panTo({lat:pos.lat,lng:pos.lng});
    map.setZoom(16);
    const m=markers.find(mk=>mk.getTitle()===p.name);
    if(m) google.maps.event.trigger(m,'click');
  },100);
}
renderStats();
render();
</script>
